url: https://itchyshin.github.io/drmSEM

# Build into a dedicated dir, not docs/, which holds design + memory docs.
destination: pkgdown-site

template:
  bootstrap: 5
  bslib:
    bootswatch: flatly
    primary: "#0f7887"
    headings-color: "#112638"
    link-color: "#0f7887"

# `release`, not `auto`: the GitHub-Actions Pages deploy replaces the whole site
# with each build, so a dev version (0.1.0.9000) under `auto` would nest the site
# under /dev/ and leave the root 404. `release` always builds to the site root.
development:
  mode: release

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: Building a distributional SEM
    desc: Assemble a piecewise SEM from drmTMB nodes.
    contents:
      - drm_node
      - drm_sem
      - drm_psem
  - title: Graph and paths
    desc: Inspect the component-labelled structural graph.
    contents:
      - paths
      - standardize
      - plot.drm_sem
  - title: Covariance edges (bivariate)
    desc: Declare and inspect residual (rho12) and higher-level (corpair) covariance edges.
    contents:
      - covary
      - covariances
  - title: Latent constructs
    desc: Build composite (formative) constructs from observed indicators.
    contents:
      - drm_composite
      - loadings
  - title: d-separation
    desc: Test missing arrows on any distributional component.
    contents:
      - basis_set
      - dsep
      - fisher_c
  - title: Effects
    desc: Simulation-based direct, indirect, and total effects.
    contents:
      - direct_effects
      - indirect_effects
      - total_effects
      - path_effects
      - plot.drm_effect
  - title: Model comparison
    desc: Compare competing causal DAGs by Fisher's C / CICc.
    contents:
      - drm_dag
      - drm_model_set
      - compare
      - best
      - average
  - title: Phylogenetic SEM
    desc: Build evolutionary covariance matrices for phylogenetic nodes.
    contents:
      - drm_phylo_cov
  - title: Diagnostics
    contents:
      - check_sem

articles:
  - title: Get started
    contents:
      - drmSEM
      - drmSEM-overview
  - title: Concepts
    desc: The ideas that make drmSEM a distributional SEM.
    contents:
      - effect-decomposition
      - covariance-edges-and-composites
      - latent-variables
      - comparison
      - phylogenetic-sem
      - calibration
