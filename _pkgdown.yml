url: https://itchyshin.github.io/drmSEM

# Build into a dedicated dir, not docs/, which holds design + memory docs.
destination: pkgdown-site

template:
  bootstrap: 5
  bslib:
    bootswatch: flatly
    primary: "#0f7887"
    headings-color: "#112638"
    link-color: "#0f7887"

# `release`, not `auto`: the GitHub-Actions Pages deploy replaces the whole site
# with each build, so a dev version (e.g. 0.2.0.9000) under `auto` would nest the
# site under /dev/ and leave the root 404. `release` always builds to the site root.
development:
  mode: release

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: Building a distributional SEM
    desc: Assemble a piecewise SEM from drmTMB nodes.
    contents:
      - drm_node
      - drm_sem
      - drm_psem
  - title: Graph and paths
    desc: Inspect the component-labelled structural graph.
    contents:
      - paths
      - standardize
      - plot.drm_sem
  - title: Covariance edges (bivariate)
    desc: >
      Declare and inspect residual (rho12) and higher-level (corpair) covariance
      edges, and declare a bivariate (joint two-response) node. The joint fit that
      estimates rho12 is the 0.4 engine step; the grammar and accessors are pure-R.
    contents:
      - covary
      - covariances
      - drm_pair
      - drm_expand_pair
      - rho12
      - corpairs
  - title: Latent constructs
    desc: Build composite (formative) constructs from observed indicators.
    contents:
      - drm_composite
      - loadings
  - title: Feedback / cyclic motifs
    desc: >
      Declare a feedback motif so specific cycles are allowed (every undeclared
      cycle stays an error). The equilibrium effect engine and consistent
      estimation are staged in docs/design/10-cyclic-feedback.md.
    contents:
      - drm_cycle
      - cycles
  - title: d-separation
    desc: Test missing arrows on any distributional component.
    contents:
      - basis_set
      - dsep
      - fisher_c
  - title: Effects
    desc: Simulation-based direct, indirect, and total effects.
    contents:
      - direct_effects
      - indirect_effects
      - total_effects
      - path_effects
      - plot.drm_effect
  - title: Model comparison
    desc: Compare competing causal DAGs by Fisher's C / CICc.
    contents:
      - drm_dag
      - drm_model_set
      - compare
      - best
      - average
  - title: Interop (graph interchange)
    desc: >
      Translate a drmSEM graph to/from neighbouring ecosystems' text formats
      (lavaan model syntax, Graphviz DOT). Graph interchange only — drmSEM never
      fits its own likelihoods, and non-mean (distributional-component) paths are
      dropped-with-notice when emitting lavaan syntax, never misrepresented as a
      mean regression.
    contents:
      - as_lavaan
      - from_lavaan
      - as_dot
  - title: Phylogenetic SEM
    desc: Build evolutionary covariance matrices for phylogenetic nodes.
    contents:
      - drm_phylo_cov
  - title: Diagnostics
    contents:
      - check_sem

articles:
  - title: Get started
    contents:
      - drmSEM
      - drmSEM-overview
  - title: Concepts
    desc: The ideas that make drmSEM a distributional SEM.
    contents:
      - effect-decomposition
      - covariance-edges-and-composites
      - bivariate-nodes
      - feedback-cycles
      - latent-variables
      - comparison
      - phylogenetic-sem
      - calibration
      - validation
