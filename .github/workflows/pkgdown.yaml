# Build and deploy the pkgdown site to GitHub Pages via the official GitHub
# Actions Pages deployment (repo Settings -> Pages -> Source: GitHub Actions).
# Builds on pull requests (verification only, no deploy) and on main/master and
# releases (build + deploy). The site is written to pkgdown-site/ because docs/
# holds source documentation in this repo. drmTMB is installed from Remotes;
# vignette engine chunks are gated, so the site builds without compiling fits.
# man/*.Rd and NAMESPACE are generated by roxygen2 below, so newly added exports
# (e.g. the model-comparison functions) get reference pages on the site.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # drmTMB comes via local::. + the DESCRIPTION Remotes; listing
          # github::itchyshin/drmTMB again makes pak report a self-conflict.
          extra-packages: any::pkgdown, any::roxygen2, local::.
          needs: website
      - name: Document (roxygen2)
        run: Rscript -e 'roxygen2::roxygenise()'
        shell: bash
      - name: Build site
        run: pkgdown::build_site_github_pages(dest_dir = "pkgdown-site", new_process = FALSE, install = FALSE)
        shell: Rscript {0}
      # Ensure GitHub Pages is enabled and its Source is "GitHub Actions" (not a
      # branch), so the artifact below is actually what gets served. enablement:
      # true makes this self-healing instead of a one-time manual Settings toggle.
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pkgdown-site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
